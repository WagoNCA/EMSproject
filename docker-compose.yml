services:

  postgres:
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminer
      POSTGRES_DB: database

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SQL/database.sql:/docker-entrypoint-initdb.d/database.sql

  influxdb:
    image: influxdb:2.0.7
    restart: always
    ports:
      - "8088:8088"

    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: Adminer1234
      DOCKER_INFLUXDB_INIT_ORG: wagonca
      DOCKER_INFLUXDB_INIT_BUCKET: measurements
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: the_graal

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  backend:
    depends_on:
      - postgres
    restart: always
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env

volumes:
  postgres_data:
  influxdb_data: