services:

  postgres:
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminer
      POSTGRES_DB: database

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SQL/database.sql:/docker-entrypoint-initdb.d/database.sql

  influxdb:
    image: influxdb
    restart: always

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  backend:
    depends_on:
      - postgres
    restart: always
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: Dockerfile

volumes:
  postgres_data: