services:

  postgres:
    image: postgres
    restart: always
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminer
      POSTGRES_DB: database

  influxdb:
    image: influxdb
    restart: always

  backend:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres
